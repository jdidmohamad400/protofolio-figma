<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>protpolio</title>
    <link rel="stylesheet" href="style.css">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="navbar">
  <div class="container nav-container">
    <div class="logo">SaulDesign</div>

    <select id="languageSwitcher" class="lang-switcher">
      <option value="en">EN</option>
      <option value="ar">AR</option>
      <option value="de">DE</option>
      <option value="es">ES</option>
      <option value="it">IT</option>
    </select>

    <ul class="nav-links">
      <li><a href="#" data-i18n="nav.home"></a></li>
<li><a href="#" data-i18n="nav.about"></a></li>
<li><a href="#" data-i18n="nav.contact"></a></li>
    </ul>
  </div>
</header>

    
<section class="hero">
    <div class="container hero-container">
        <div class="hero-text">
            <h1>
  <span data-i18n="hero.line1"></span><br>
  <span data-i18n="hero.line2"></span>
</h1> 
            <div class="hero-buttons">
                <a href="#" class="btn primary" data-i18n="hero.hire"></a>
<a href="#" class="btn secondary" data-i18n="hero.download"></a>
                
            </div>
        </div>
        <div class="hero-image">
          <img src="assets/svg/Hero.svg" alt="">
            </div>
        </div>
    </div>
</section>
 <section class="about">
  <div class="about-text">
    <h2>
  <span data-i18n="about.title1"></span>
  <span data-i18n="about.title2"></span>
</h2>
   <p data-i18n="about.description"></p>
 <a href="#" data-i18n="about.readMore"></a>
  </div>

  <div class="about-image">
    <img src="assets/imags/Group 2373.png" alt="">
  </div>
</section>
  
    <section class="works" id="MyWorks">
      <div class="worksContainer">
        <div class="projectTitle">
          <h1 class="aboutName" data-i18n="works.recent"></h1>
<h1 class="aboutTitle" data-i18n="works.works"></h1>
        </div>
           <div class="works-filters">
      <button class="active" data-i18n="works.all"></button>
<button data-i18n="works.ui"></button>
<button data-i18n="works.ux"></button>
<button data-i18n="works.web"></button>
    </div>
        <ul>
          <li>
            <a href="">
              <img src="assets/imags/landingPage.png" alt="landingPage">
            </a>
          </li>
          <li>
            <a href=""><img src="assets/imags/webApp.png" alt="webApp" /></a>
          </li>
          <li>
            <a href=""><img src="assets/imags/app.png" alt=" app page" /></a>
          </li>
        </ul>
      </div>
    </section>
    <section>
   <section class="contact" id="contact">
  <div class="container">

    <div class="contact-container">


      <div class="contact-left">
       <h2>
  <span data-i18n="contact.line1"></span><br>
  <span data-i18n="contact.line2"></span>
</h2>

        <div class="contact-illustration">
          <img src="assets/svg/hero5.png.png" alt="">
        </div>
      </div>

      <div class="contact-right">
        <form class="contact-form">

          <div class="input-row">
          <input type="text" data-i18n="contact.name">
<input type="email" data-i18n="contact.email">
          </div>

         <textarea data-i18n="contact.message"></textarea>
        </form>
   <button class="send-btn" data-i18n="contact.send"></button>
      </div>

    </div>

  </div>

<div class="contact-social">
  
  <a href="#"><img src="assets/svg/twitter.svg" alt="twitter"></a>
  <a href="#"><img src="assets/svg/youtube.svg" alt="youtube"></a>
</div>

    
</section>
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>


      
</body>
</html>
